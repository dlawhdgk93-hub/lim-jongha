name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'voice-secretary/**'
      - 'supabase/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: voice-secretary

    env:
      EXPO_PUBLIC_SUPABASE_URL: https://ybrnljmnuahopuuyexog.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlicm5sam1udWFob3B1dXlleG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MTgyOTYsImV4cCI6MjA5ODM5NDI5Nn0.9VOJXaqNrZANHeHPp-T-7ktf16ZQzymvl9BHznG56EA

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: voice-secretary/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Tune Gradle memory
        run: echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare phone-friendly APK name
        run: cp android/app/build/outputs/apk/debug/app-debug.apk ../teamday-v1.0.15.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamday-apk
          path: voice-secretary/teamday-v1.0.15.apk
          if-no-files-found: error

      - name: Publish GitHub Release (phone download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.15
          name: TeamDay v1.0.15
          body: |
            폰에서 바로 설치 가능한 APK입니다.
            - 파일: teamday-v1.0.15.apk
            - 설정에서 "알 수 없는 출처" 허용 후 설치하세요.
          files: voice-secretary/teamday-v1.0.15.apk
          make_latest: true
          overwrite: true

      - name: Summary
        run: |
          ls -lh teamday-v1.0.15.apk
          echo "Download: https://github.com/dlawhdgk93-hub/lim-jongha/releases/latest/download/teamday-v1.0.15.apk"
